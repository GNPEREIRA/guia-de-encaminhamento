<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Guia de encaminhamento</title>
</head>
<body>

    <div id="principal">

        <div id="conteiner-cabecalho">
            <div>
                <img src="img/logo-prosed.jpg" alt="">
            </div>
            <div id="titulo1">
                <p class="text1">GUIA DE ENCAMINHAMENTO DE EXAMES</p>
            </div>
            <div id="titulo2">
                <p class="text2">CONVÊNIO</p>
            </div>
        </div>
        
        <!--Dados da empresa-->
        <fieldset>
            <legend>Dados da sua Empresa</legend>

            <div id="campos-empresa">
                <div id="campo-cnpj">
                    <label for="cnpj">CNPJ</label>
                    <input type="text" id="cnpj" maxlength="18" oninput="mascaraCNPJ(this)" onblur="buscarDadosCNPJ()">
                </div>
    
                <div id="conteiner-dados">
        
                    <div id="razaoSocial">
                        <label for="razaoSocial">Razão Social</label>
                        <input type="text" id="razao-social" style="width: 500px;">
                    </div>
    
                    <div id="unidadeObra">
                        <label for="unidade-obra">Unidade / Obra</label>
                        <input type="text" id="unidade-obra" style="width: 200px;">
                    </div>
                </div>
            </div>
        </fieldset>

        <!--Dados do funcionário-->
        <fieldset>
            <legend>Dados do funcionário</legend>

            <div id="secao1">
                <div id="nome-funcionario">
                    <label for="nomeFuncionario">Nome</label>
                    <input type="text" id="nomeFuncionario" style="width: 200px;">
                </div>
                <div id="registro-civil">
                    <label for="rg">RG</label>
                    <input type="text" id="rg" style="width: 200px;">
                </div>
                <div id="cadastro-pessoa-fisica">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" style="width: 200px;">
                </div>
            </div>
            <div id="secao2">
               
            </div>
        </fieldset>

    </div><!--fim principal-->

    <script src="script.js"></script>
</body>
</html>
