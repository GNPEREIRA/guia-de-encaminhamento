<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Guia de encaminhamento</title>
</head>
<body>

    <div id="principal">

        <div id="conteiner-cabecalho">
            <div class="imagem">
                <img src="img/logo-prosed.jpg" alt="Logo-Prosed">
            </div>
            <div id="titulo1">
                <p class="text1">GUIA DE ENCAMINHAMENTO DE EXAMES</p>
            </div>
            
        </div>
        
        <!--Dados da empresa-->
        <fieldset  class="box">
            <legend>Dados da sua Empresa</legend>

            <div class="campos-empresa">
                <div class="campo-cnpj">
                    <label for="cnpj">CNPJ
                        <img src="img/pergunta.png" alt="" id="pergunta" onmouseover="dica()" style="margin-left: 5px;">
                    </label>
                    <input type="text" inputmode="numeric" id="cnpj" maxlength="18" oninput="mascaraCNPJ(this)" onblur="buscarDadosCNPJ()">
                </div>
    
                <div class="razaoSocial">
                    <label for="razaoSocial">Razão Social</label>
                    <input type="text" id="razao-social">
                </div>

                <div class="unidadeObra">
                    <label for="unidade-obra">Unidade</label>
                    <input type="text" id="unidade-obra">
                </div> 
            </div> 
        </fieldset>

        <!--Dados do funcionário-->
        <fieldset  class="box">
            <legend>Dados do funcionário</legend>

            <div class="campos-funcionario">
                <div class="nome">
                    <label for="nome-funcionario">Nome</label>
                    <input type="text" id="nome-funcionario" oninput="somenteLetras(this)">
                </div>
    
                <div class="data-nascimento">
                    <label for="data-nascimento">Data de nascimento</label>
                    <input type="date" id="data-nascimento">
                </div>

                <div class="rg">
                    <label for="rg">R.G.</label>
                    <input type="text" inputmode="numeric" id="rg" oninput="somenteNumero(this)">
                </div>

                <div class="cargo">
                    <label for="cargo">Cargo</label>
                    <input type="text" id="cargo">
                </div> 

                <div class="cpf">
                    <label for="cpf">CPF</label>
                    <input type="text" inputmode="numeric" maxlength="14" id="cpf" oninput="formatarCPF()">
                </div>

                <div class="setor">
                    <label for="setor">Setor</label>
                    <input type="text" id="setor">
                </div> 
            </div> 
        </fieldset>

        <!--Exames-->
        <fieldset  class="box">
            <legend>Exames</legend>

            <div id="exames">
                <div class="tipos">
                    <label for="tipos">Tipos</label>
                    <select name="tipos" id="tipos">
                        <option value=""></option>
                        <option value="admissional">Admissional</option>
                        <option value="avaliacao-medica">Avaliação médica</option>
                        <option value="demissional">Demissional</option>
                        <option value="laudo-pcd">Laudo de PCD</option>
                        <option value="mudança-de-funcao">Mudança de função</option>
                        <option value="periodico">Periódico</option>
                        <option value="retorno-ao-trabalho">Retorno ao trabalho</option>
                        <option value="trabalho-em-altura">Trabalho em altura</option>
                    </select>
                </div>

                <div class="toxicologicos">
                    <label for="toxicologicos">Toxicológicos</label>
                    <select name="toxicologicos" id="toxicologicos">
                        <option value=""></option>
                        <option value="clt">CLT</option>
                        <option value="detran">DETRAN</option>        
                    </select>
                </div>
            </div>

        </fieldset>

    </div><!--fim principal-->

    <script src="script.js"></script>
</body>
</html>
